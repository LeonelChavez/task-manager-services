spring.application.name=taskmanager-service

#datasource
spring.datasource.username=teleios
spring.datasource.password=teleios12
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/TaskManager
spring.sql.init.platform=dev
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.proc.param_null_passing=true
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.org.hibernate.SQL=debug
spring.jackson.time-zone =America/Mexico_City
spring.jackson.locale=es_MX

#Mysql
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=20000
spring.datasource.hikari.max-lifetime=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.minimum-idle=2

#Cors
#app.cors.allowed-origins=http://localhost:4200